<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <!-- Fond transparent -->

  <!-- Bande verte gauche décorative -->
  <rect x="0" y="0" width="8" height="120" fill="#009639"/>

  <!-- Cercle logo OFPPT -->
  <circle cx="70" cy="60" r="50" fill="#009639"/>
  <circle cx="70" cy="60" r="44" fill="white"/>

  <!-- Lettres OFPPT dans le cercle -->
  <text x="70" y="52" font-family="Arial Black, Arial" font-weight="900" font-size="15"
        fill="#009639" text-anchor="middle" letter-spacing="1">OFPPT</text>

  <!-- Étoile marocaine stylisée -->
  <g transform="translate(70,70)">
    <polygon points="0,-12 2.8,-3.8 11.4,-3.8 4.6,1.5 7.1,9.7 0,4.8 -7.1,9.7 -4.6,1.5 -11.4,-3.8 -2.8,-3.8"
             fill="#009639" opacity="0.7"/>
  </g>

  <!-- Ligne séparatrice verte -->
  <rect x="130" y="15" width="3" height="90" fill="#009639" opacity="0.3"/>

  <!-- Texte principal OFPPT -->
  <text x="150" y="42" font-family="Arial Black, Arial" font-weight="900" font-size="28"
        fill="#009639" letter-spacing="2">OFPPT</text>

  <!-- Sous-titre officiel -->
  <text x="150" y="62" font-family="Arial, sans-serif" font-size="9.5"
        fill="#333333" letter-spacing="0.5">OFFICE DE LA FORMATION PROFESSIONNELLE</text>
  <text x="150" y="75" font-family="Arial, sans-serif" font-size="9.5"
        fill="#333333" letter-spacing="0.5">ET DE LA PROMOTION DU TRAVAIL</text>

  <!-- Ligne décorative verte sous le texte -->
  <rect x="150" y="82" width="220" height="2" fill="#009639"/>

  <!-- Texte arabe (اوفپپت) -->
  <text x="370" y="100" font-family="Arial, sans-serif" font-size="11"
        fill="#009639" text-anchor="end" font-weight="bold">المكتب الوطني للتكوين المهني وإنعاش الشغل</text>
</svg>
